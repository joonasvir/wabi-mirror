<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Wabi Mirror</title>
<style>
@font-face {
  font-family: 'Selecta';
  src: url('/fonts/Selecta-Regular.otf') format('opentype');
  font-weight: 400;
}
@font-face {
  font-family: 'Selecta';
  src: url('/fonts/Selecta-Medium.otf') format('opentype');
  font-weight: 500;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #ffffff;
  --white: #ffffff;
  --black: #090909;
  --text-primary: #0a0a0a;
  --text-secondary: #6b6b6b;
  --text-muted: #a3a3a3;
  --tile-shadow: 0px 1.2px 2.4px rgba(0,0,0,0.08);
  --tile-inner: inset -1.1px -1.1px 1.1px rgba(0,0,0,0.18), inset 1.1px 1.1px 1.1px rgba(0,0,0,0.03);
  --radius-tile: 24px;
  --font: 'Selecta', -apple-system, sans-serif;
}

html, body {
  height: 100%;
  background: #e5e5e5;
  font-family: var(--font);
  -webkit-font-smoothing: antialiased;
}

/* Phone shell — centers and constrains to mobile */
#app {
  position: relative;
  width: 393px;
  min-height: 100vh;
  margin: 0 auto;
  background: var(--bg);
  overflow: hidden;
}

/* ─── iOS status chrome ─────────────────────────────────────── */
.ios-chrome {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 47px;
  padding: 14px 28px 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  z-index: 30;
  pointer-events: none;
  font-size: 15px;
  font-weight: 600;
  color: var(--text-primary);
  letter-spacing: -0.2px;
}
.ios-chrome.dark { color: white; }
.ios-chrome .ios-icons { display: flex; gap: 6px; align-items: center; opacity: 0.95; }
.ios-chrome svg path,
.ios-chrome svg rect { fill: currentColor; }
.ios-chrome svg.stroke path { stroke: currentColor; fill: none; }

/* ─── Screens ──────────────────────────────────────────────── */
.screen {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.35s ease;
}
.screen.active {
  opacity: 1;
  pointer-events: all;
}

/* ─── Status Bar ───────────────────────────────────────────── */
.status-bar {
  height: 54px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 28px;
  flex-shrink: 0;
}
.status-time { font-size: 15px; font-weight: 500; color: var(--text-primary); }
.status-icons { display: flex; gap: 6px; align-items: center; }
.status-icons svg { opacity: 0.85; }

/* ─── Intro Screen ─────────────────────────────────────────── */
#screen-intro {
  align-items: center;
  justify-content: center;
  background: var(--bg);
}

.intro-orblet {
  width: 96px;
  height: 96px;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, rgba(255,255,255,0.9), rgba(200,200,200,0.3));
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.8);
  box-shadow:
    0 12px 40px rgba(0,0,0,0.12),
    0 4px 16px rgba(0,0,0,0.08),
    inset 0 1px 0 rgba(255,255,255,0.9),
    inset 0 -1px 0 rgba(0,0,0,0.06);
  margin-bottom: 40px;
  animation: orbletFloat 4s ease-in-out infinite;
  position: relative;
  overflow: hidden;
}

.intro-orblet::after {
  content: '';
  position: absolute;
  top: 10%;
  left: 15%;
  width: 60%;
  height: 40%;
  background: radial-gradient(ellipse, rgba(255,255,255,0.7), transparent);
  border-radius: 50%;
  transform: rotate(-30deg);
}

@keyframes orbletFloat {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}

.intro-title {
  font-size: 26px;
  font-weight: 500;
  color: var(--text-primary);
  letter-spacing: -0.4px;
  margin-bottom: 10px;
}
.intro-subtitle {
  font-size: 14px;
  font-weight: 400;
  color: var(--text-secondary);
  text-align: center;
  max-width: 240px;
  line-height: 20px;
  margin-bottom: 44px;
}

.btn-primary {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 48px;
  padding: 0 40px;
  border-radius: 999px;
  background: var(--text-primary);
  color: white;
  font-family: var(--font);
  font-size: 14px;
  font-weight: 500;
  border: none;
  cursor: pointer;
  transition: transform 0.15s ease, opacity 0.15s ease;
}
.btn-primary:active { transform: scale(0.97); opacity: 0.85; }

/* ─── Question Screen ──────────────────────────────────────── */
#screen-question {
  background: var(--bg);
}

.q-topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px 0;
  height: 64px;
  margin-top: 47px;
  flex-shrink: 0;
}

.btn-back {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  border: none;
  background: rgba(255,255,255,0.85);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  box-shadow: 0 2px 8px rgba(0,0,0,0.1), 0 0 0 1px rgba(0,0,0,0.04);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform 0.15s ease;
}
.btn-back:active { transform: scale(0.92); }

/* Progress ring (matches back button size: 40px) */
.progress-ring-wrap {
  position: relative;
  width: 40px;
  height: 40px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.progress-ring-svg {
  position: absolute;
  inset: 0;
  transform: rotate(-90deg);
}
.progress-track {
  fill: none;
  stroke: rgba(0,0,0,0.08);
  stroke-width: 2;
}
.progress-metal {
  position: absolute;
  inset: 0;
  width: 40px;
  height: 40px;
  pointer-events: none;
  -webkit-mask-repeat: no-repeat;
          mask-repeat: no-repeat;
  -webkit-mask-size: 100% 100%;
          mask-size: 100% 100%;
}

.mini-orblet {
  width: 54px;
  height: 54px;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, rgba(255,255,255,0.95), rgba(210,210,210,0.4));
  border: 1px solid rgba(255,255,255,0.7);
  box-shadow:
    0 4px 16px rgba(0,0,0,0.1),
    inset 0 1px 0 rgba(255,255,255,0.9),
    inset 0 -1px 0 rgba(0,0,0,0.05);
  position: relative;
  overflow: hidden;
}
.mini-orblet::after {
  content: '';
  position: absolute;
  top: 12%;
  left: 16%;
  width: 55%;
  height: 38%;
  background: radial-gradient(ellipse, rgba(255,255,255,0.75), transparent);
  border-radius: 50%;
  transform: rotate(-25deg);
}

/* Spacer on right to keep ring centered */
.q-topbar-right {
  width: 40px;
}

.q-content {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding-bottom: 32px;
}

.q-question {
  font-size: 20px;
  font-weight: 500;
  color: var(--text-primary);
  text-align: center;
  line-height: 26px;
  padding: 16px 36px 20px;
  letter-spacing: -0.3px;
  /* Reserve room for up to 2 lines so single-line questions
     don't push the tiles around. */
  min-height: 88px;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* 2×2 tile grid */
.options-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  align-content: start;
  gap: 10px;
  padding: 0 10px;
  /* Reserve the 2×2 square footprint at the design width (393px),
     so the question/header position stays put when tiles are absent. */
  min-height: 374px;
}

.option-tile {
  aspect-ratio: 1 / 1;
  background: var(--white);
  border-radius: var(--radius-tile);
  box-shadow: var(--tile-shadow), var(--tile-inner);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 14px 12px 14px;
  gap: 10px;
  cursor: pointer;
  border: none;
  font-family: var(--font);
  position: relative;
  overflow: hidden;
  transition:
    transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1),
    opacity 0.25s ease,
    box-shadow 0.2s ease;
  transform-origin: center center;
  will-change: transform, opacity;
}

.option-tile:active {
  transform: scale(0.97);
}

.option-tile .tile-icon {
  width: 60px;
  height: 60px;
  object-fit: contain;
  display: block;
  flex-shrink: 0;
  transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
}

.option-tile .tile-label {
  font-size: 13px;
  font-weight: 500;
  color: var(--text-primary);
  text-align: center;
  line-height: 17px;
  letter-spacing: -0.1px;
}

/* Selection states */
.option-tile.selected {
  box-shadow: 0 0 0 2px var(--text-primary), var(--tile-shadow);
  transform: scale(1.03);
}
.option-tile.selected .tile-icon {
  transform: scale(1.08);
}
.option-tile.fading {
  opacity: 0.25;
  transform: scale(0.95);
}
.option-tile.exit {
  opacity: 0;
  transform: translateY(20px) scale(0.93);
  pointer-events: none;
}
.option-tile.enter {
  opacity: 0;
  transform: translateY(24px) scale(0.95);
}
.option-tile.enter-active {
  opacity: 1;
  transform: translateY(0) scale(1);
  transition:
    transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1),
    opacity 0.3s ease;
}

/* Stagger delays */
.option-tile:nth-child(1) { transition-delay: 0s; }
.option-tile:nth-child(2) { transition-delay: 0.05s; }
.option-tile:nth-child(3) { transition-delay: 0.1s; }
.option-tile:nth-child(4) { transition-delay: 0.15s; }

/* Bottom area — fixed height so question/tiles don't shift
   when the loading dots or "See your mirror" button toggle. */
.q-bottom {
  padding: 12px 16px 28px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 8px;
  height: 92px;
  flex-shrink: 0;
}

.btn-results {
  font-family: var(--font);
  font-size: 15px;
  font-weight: 500;
  color: var(--text-muted);
  background: none;
  border: none;
  cursor: pointer;
  padding: 8px 16px;
  border-radius: 999px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.5s ease, color 0.2s ease;
}
.btn-results.visible {
  opacity: 1;
  pointer-events: all;
}
.btn-results:hover { color: var(--text-secondary); }

/* ─── Completion ritual ─────────────────────────────────────── */
.completion-state {
  flex: 1;
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 24px;
  padding-bottom: 64px;
}
#screen-question.completing .q-content { display: none; }
#screen-question.completing .completion-state { display: flex; }

.completion-orb {
  position: relative;
  width: 132px;
  height: 132px;
  border: none;
  background: transparent;
  padding: 0;
  cursor: pointer;
  border-radius: 50%;
  -webkit-tap-highlight-color: transparent;
  /* Storyboard: orb starts as the small topbar ring (size 40, position 380px
     above centre), then slides down and grows to its final centre position. */
  animation: orbStoryboard 1100ms cubic-bezier(0.22, 1, 0.36, 1) backwards;
  transition: transform 0.18s ease;
  overflow: hidden;
}
.completion-orb:active { transform: scale(0.96); }
.completion-orb.filled { animation: orbFilledFloat 4s ease-in-out infinite; cursor: default; }

@keyframes orbStoryboard {
  /* Frames 1→2: appear at the topbar ring position, same 40px size */
  0%   { opacity: 0; transform: translateY(-380px) scale(0.30); }
  18%  { opacity: 1; transform: translateY(-380px) scale(0.30); }
  /* Frames 2→3: travel down to centre, scaling up to full 132px */
  100% { opacity: 1; transform: translateY(0)      scale(1.00); }
}
@keyframes orbFilledFloat {
  0%, 100% { transform: translateY(0); }
  50%      { transform: translateY(-4px); }
}

.completion-orb .completion-track {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  transition: opacity 0.5s ease;
}
.completion-orb.filled .completion-track { opacity: 0; }

.completion-orb .completion-metal {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  -webkit-mask-repeat: no-repeat;
          mask-repeat: no-repeat;
  -webkit-mask-size: 100% 100%;
          mask-size: 100% 100%;
  transition: opacity 0.45s ease;
}
.completion-orb.filled .completion-metal { opacity: 0; }

.completion-orb .orb-video {
  position: absolute;
  /* Scale up the source so the orb fills the visible circle and the
     white video margins get cropped out. The 3D asset has the orb
     centred at ~65% of the frame, so a 1.55× zoom lands it edge-to-edge. */
  top: 50%;
  left: 50%;
  width: 155%;
  height: 155%;
  transform: translate(-50%, -50%) scale(0.85);
  transform-origin: center center;
  border-radius: 50%;
  object-fit: cover;
  opacity: 0;
  transition: opacity 0.6s ease, transform 0.9s cubic-bezier(0.34, 1.56, 0.64, 1);
  pointer-events: none;
}
.completion-orb.filled .orb-video {
  opacity: 1;
  transform: translate(-50%, -50%) scale(1);
}
.completion-orb.filled {
  box-shadow:
    0 18px 36px rgba(0,0,0,0.14),
    0 6px 14px rgba(0,0,0,0.08);
}

.completion-label {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--text-muted);
  /* Hold the label until the orb has finished travelling, then start the pulse */
  animation:
    labelAppear 1500ms ease backwards,
    completionPulse 2.4s ease-in-out infinite 1500ms;
  transition: opacity 0.35s ease;
}
@keyframes labelAppear {
  0%, 75% { opacity: 0; transform: translateY(6px); }
  100%    { opacity: 0.45; transform: translateY(0); }
}
#screen-question.completing .completion-orb.filled ~ .completion-label {
  opacity: 0;
  animation: none;
}

@keyframes completionPulse {
  0%, 100% { opacity: 0.45; }
  50%      { opacity: 1; }
}

/* During completion, the topbar progress ring fades quickly — the centred
   orb takes over the visual journey from there. */
#screen-question.completing .progress-ring-wrap {
  opacity: 0;
  transform: scale(0.7);
  transition: opacity 220ms ease, transform 220ms ease;
}
#screen-question.completing .btn-back {
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.4s ease;
}

/* Loading dots */
.loading-dots {
  display: flex;
  gap: 6px;
  align-items: center;
  justify-content: center;
  padding: 0;
}
.loading-dots span {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--text-muted);
  animation: dotPulse 1.2s ease-in-out infinite;
}
.loading-dots span:nth-child(2) { animation-delay: 0.2s; }
.loading-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes dotPulse {
  0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
  40% { transform: scale(1); opacity: 1; }
}

/* ─── Mirror Screen ────────────────────────────────────────── */
#screen-mirror {
  background: #0a0a0a;
  align-items: center;
}

.mirror-status-bar { color: white; }

.mirror-topbar {
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px 0;
  height: 56px;
  margin-top: 47px;
  flex-shrink: 0;
}

.btn-back-dark {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  border: none;
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform 0.15s ease;
}
.btn-back-dark:active { transform: scale(0.92); }

/* 5-circle Wabi Mark */
.wabi-mark {
  margin: 16px 0 22px;
  display: grid;
  grid-template-columns: 76px 76px 76px;
  grid-template-rows: 76px 76px;
  gap: 8px;
  justify-content: center;
}

.wabi-circle {
  width: 76px;
  height: 76px;
  border-radius: 50%;
  overflow: hidden;
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  position: relative;
}
.wabi-circle canvas {
  width: 100%;
  height: 100%;
  display: block;
}

/* Pentagon arrangement:
   col1    col2    col3
   [E]     [I]
       [R]
   [B]     [A]
*/
.wabi-circle:nth-child(1) { grid-column: 1; grid-row: 1; }
.wabi-circle:nth-child(2) { grid-column: 3; grid-row: 1; }
.wabi-circle:nth-child(3) { grid-column: 2; grid-row: 1; margin-top: 34px; } /* center-top offset */
.wabi-circle:nth-child(4) { grid-column: 1; grid-row: 2; }
.wabi-circle:nth-child(5) { grid-column: 3; grid-row: 2; }

.mirror-label {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.1em;
  color: rgba(255,255,255,0.3);
  text-transform: uppercase;
  margin-bottom: 16px;
}

.mirror-text {
  font-size: 15px;
  font-weight: 400;
  color: rgba(255,255,255,0.92);
  line-height: 22px;
  text-align: center;
  padding: 0 28px;
  letter-spacing: -0.1px;
  margin-bottom: 24px;
}

.mirror-user-num {
  font-size: 13px;
  font-weight: 500;
  color: rgba(255,255,255,0.3);
  margin-bottom: 32px;
}

.mirror-actions {
  display: flex;
  gap: 12px;
  width: 100%;
  padding: 0 24px;
}

.btn-share {
  flex: 1;
  height: 46px;
  border-radius: 999px;
  background: white;
  color: #0a0a0a;
  font-family: var(--font);
  font-size: 13px;
  font-weight: 500;
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  transition: opacity 0.2s ease;
}
.btn-share:active { opacity: 0.85; }

.btn-apps {
  flex: 1;
  height: 46px;
  border-radius: 999px;
  background: rgba(255,255,255,0.1);
  color: rgba(255,255,255,0.85);
  font-family: var(--font);
  font-size: 13px;
  font-weight: 500;
  border: 1px solid rgba(255,255,255,0.15);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  transition: opacity 0.2s ease;
}
.btn-apps:active { opacity: 0.75; }

/* ─── Apps Screen ──────────────────────────────────────────── */
#screen-apps {
  background: #0a0a0a;
}

.apps-topbar {
  width: 100%;
  display: flex;
  align-items: center;
  padding: 12px 16px 0;
  height: 56px;
  margin-top: 47px;
  flex-shrink: 0;
}

.apps-title {
  font-size: 13px;
  font-weight: 500;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.35);
  text-align: center;
  width: 100%;
  padding: 20px 24px 12px;
}

.apps-list {
  flex: 1;
  overflow-y: auto;
  padding: 0 16px 40px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  -webkit-overflow-scrolling: touch;
}

.app-card {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.09);
  border-radius: 20px;
  padding: 18px 20px;
  display: flex;
  align-items: center;
  gap: 16px;
  opacity: 0;
  transform: translateY(16px);
  transition: opacity 0.4s ease, transform 0.4s ease;
}
.app-card.visible {
  opacity: 1;
  transform: translateY(0);
}

.app-card-num {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: rgba(255,255,255,0.08);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  font-weight: 500;
  color: rgba(255,255,255,0.5);
  flex-shrink: 0;
}

.app-card-content { flex: 1; }

.app-card-name {
  font-size: 14px;
  font-weight: 500;
  color: rgba(255,255,255,0.92);
  margin-bottom: 4px;
}

.app-card-reason {
  font-size: 12px;
  font-weight: 400;
  color: rgba(255,255,255,0.45);
  line-height: 17px;
}

.apps-done-btn {
  margin: 8px 16px 0;
  flex-shrink: 0;
  height: 52px;
  border-radius: 999px;
  background: rgba(255,255,255,0.08);
  color: rgba(255,255,255,0.6);
  font-family: var(--font);
  font-size: 15px;
  font-weight: 500;
  border: 1px solid rgba(255,255,255,0.1);
  cursor: pointer;
  opacity: 0;
  transition: opacity 0.5s ease;
}
.apps-done-btn.visible { opacity: 1; }

/* ─── Transition animations ────────────────────────────────── */
@keyframes fadeSlideUp {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}

.mirror-reveal > * {
  animation: fadeSlideUp 0.5s ease both;
}
.mirror-reveal > *:nth-child(1) { animation-delay: 0.1s; }
.mirror-reveal > *:nth-child(2) { animation-delay: 0.25s; }
.mirror-reveal > *:nth-child(3) { animation-delay: 0.5s; }
.mirror-reveal > *:nth-child(4) { animation-delay: 0.65s; }
.mirror-reveal > *:nth-child(5) { animation-delay: 0.75s; }
.mirror-reveal > *:nth-child(6) { animation-delay: 0.85s; }

<aside id="sidebar">

<script>
// ── State ──────────────────────────────────────────────────────────
const MAX_Q = 10;
const MIN_Q = 5;

const state = {
  history: [],
  current: null,        // { question, options, icons }
  cache: new Map(),     // historyKey → Promise<question>
  isTransitioning: false,
  mirrorData: null,
};

// ── Helpers ────────────────────────────────────────────────────────
function historyKey(h) {
  return JSON.stringify(h.map(e => e.a));
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  // iOS chrome flips colour on dark screens
  setChromeTheme(id === 'screen-mirror' || id === 'screen-apps');
}

// ── Progress ring (metal-fx liquid metal) ──────────────────────────
// Canvas is 40×40. We carve out a thin ring at r=18 with 3px stroke.
const PROGRESS_VIEW = 40;
const PROGRESS_CENTER = 20;
const PROGRESS_R = 18;
const PROGRESS_STROKE = 3;
const PROGRESS_CIRC = 2 * Math.PI * PROGRESS_R;
let _progressTarget = 0;
let _progressCurrent = 0;
let _progressRAF = null;

function _progressMaskUrl(p) {
  const offset = PROGRESS_CIRC * (1 - Math.max(0, Math.min(1, p)));
  // White stroke = visible mask; rotated -90° so progress starts at top.
  const svg = `<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 ${PROGRESS_VIEW} ${PROGRESS_VIEW}'><circle cx='${PROGRESS_CENTER}' cy='${PROGRESS_CENTER}' r='${PROGRESS_R}' fill='none' stroke='white' stroke-width='${PROGRESS_STROKE}' stroke-linecap='round' stroke-dasharray='${PROGRESS_CIRC.toFixed(3)}' stroke-dashoffset='${offset.toFixed(3)}' transform='rotate(-90 ${PROGRESS_CENTER} ${PROGRESS_CENTER})'/></svg>`;
  return `url("data:image/svg+xml;utf8,${encodeURIComponent(svg)}")`;
}

function _applyProgressMask(p) {
  const canvas = document.getElementById('progress-metal');
  if (!canvas) return;
  const url = _progressMaskUrl(p);
  canvas.style.maskImage = url;
  canvas.style.webkitMaskImage = url;
}

function updateProgress(n, max) {
  _progressTarget = n / max;
  if (_progressRAF) cancelAnimationFrame(_progressRAF);
  const start = _progressCurrent;
  const startTime = performance.now();
  const dur = 500;
  const tick = (t) => {
    const k = Math.min(1, (t - startTime) / dur);
    const eased = 1 - Math.pow(1 - k, 3);
    _progressCurrent = start + (_progressTarget - start) * eased;
    _applyProgressMask(_progressCurrent);
    if (k < 1) _progressRAF = requestAnimationFrame(tick);
    else _progressRAF = null;
  };
  _progressRAF = requestAnimationFrame(tick);
}

// ── Big orb metal ring (centered completion state) ────────────────
// Mirror of the small topbar ring, sized 132×132 with a thicker stroke so
// the metal arc reads at the larger scale.
const ORB_VIEW = 132;
const ORB_CENTER = 66;
// Align the mask ring with where metal-fx actually paints (just inside the
// canvas edge), so the chromatic shader is visible through the mask.
const ORB_R = 64;
const ORB_STROKE = 4;
const ORB_CIRC = 2 * Math.PI * ORB_R;
let _orbProgress = 0;

function _orbMaskUrl(p) {
  const offset = ORB_CIRC * (1 - Math.max(0, Math.min(1, p)));
  const svg = `<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 ${ORB_VIEW} ${ORB_VIEW}'><circle cx='${ORB_CENTER}' cy='${ORB_CENTER}' r='${ORB_R}' fill='none' stroke='white' stroke-width='${ORB_STROKE}' stroke-linecap='round' stroke-dasharray='${ORB_CIRC.toFixed(3)}' stroke-dashoffset='${offset.toFixed(3)}' transform='rotate(-90 ${ORB_CENTER} ${ORB_CENTER})'/></svg>`;
  return `url("data:image/svg+xml;utf8,${encodeURIComponent(svg)}")`;
}
function _applyOrbMask(p) {
  _orbProgress = p;
  const canvas = document.getElementById('completion-metal');
  if (!canvas) return;
  const url = _orbMaskUrl(p);
  canvas.style.maskImage = url;
  canvas.style.webkitMaskImage = url;
}
function setOrbProgress(p) { _applyOrbMask(p); }
function animateOrbProgressTo(target, durMs = 700) {
  return new Promise(resolve => {
    const from = _orbProgress;
    const start = performance.now();
    const tick = (t) => {
      const k = Math.min(1, (t - start) / durMs);
      const eased = 1 - Math.pow(1 - k, 3);
      _applyOrbMask(from + (target - from) * eased);
      if (k < 1) requestAnimationFrame(tick);
      else resolve();
    };
    requestAnimationFrame(tick);
  });
}

// Initialise both metal-fx shaders (small topbar ring + big completion orb).
(async () => {
  try {
    const { createInstance, setSharedPreset } = await import('https://esm.sh/metal-fx@0.2.3');
    setSharedPreset('chromatic', 'dark');

    const small = document.getElementById('progress-metal');
    if (small) {
      createInstance({
        hostCanvas: small,
        cssWidth: PROGRESS_VIEW,
        cssHeight: PROGRESS_VIEW,
        cornerRadius: PROGRESS_VIEW / 2,
        kind: 'circle',
        ringCssPx: PROGRESS_STROKE,
      });
      _applyProgressMask(_progressCurrent);
    }

    const big = document.getElementById('completion-metal');
    if (big) {
      createInstance({
        hostCanvas: big,
        cssWidth: ORB_VIEW,
        cssHeight: ORB_VIEW,
        cornerRadius: ORB_VIEW / 2,
        kind: 'circle',
        ringCssPx: ORB_STROKE,
      });
      _applyOrbMask(_orbProgress);
    }
  } catch (err) {
    console.error('metal-fx init failed:', err);
  }
})();

// ── Sidebar / prompt-version state ─────────────────────────────────
function getPromptVersion(kind) {
  const key = kind === 'mirror' ? 'wabi-prompt-mirror' : 'wabi-prompt-question';
  return localStorage.getItem(key) || 'concise';
}
function setPromptVersion(kind, value) {
  const key = kind === 'mirror' ? 'wabi-prompt-mirror' : 'wabi-prompt-question';
  localStorage.setItem(key, value);
}
function initSidebar() {
  const qVal = getPromptVersion('question');
  const mVal = getPromptVersion('mirror');
  document.querySelectorAll('input[name="prompt-q"]').forEach(r => {
    r.checked = (r.value === qVal);
    r.addEventListener('change', () => setPromptVersion('question', r.value));
  });
  document.querySelectorAll('input[name="prompt-m"]').forEach(r => {
    r.checked = (r.value === mVal);
    r.addEventListener('change', () => setPromptVersion('mirror', r.value));
  });
  document.getElementById('btn-restart')?.addEventListener('click', restartQuiz);
  document.getElementById('btn-preview-orb')?.addEventListener('click', previewOrb);
}

// Sidebar shortcut: jump straight to the orb reveal so we can iterate on it
// without playing the whole quiz. Stays on the same screen — tap re-plays.
function previewOrb() {
  state.previewOrbMode = true;
  state.mirrorPromise = null;
  showScreen('screen-question');
  document.getElementById('btn-results').classList.remove('visible');
  // Start the centre ring at 50% so the "click to complete" fill is visible.
  setOrbProgress(0.5);
  document.getElementById('screen-question').classList.add('completing');
  const orb = document.getElementById('completion-orb');
  orb.classList.remove('filled');
  delete orb.dataset.filling;
  try { document.getElementById('orb-video')?.load(); } catch {}
}

// ── iOS clock — live time ──────────────────────────────────────────
function updateClock() {
  const el = document.getElementById('ios-time');
  if (!el) return;
  const d = new Date();
  let h = d.getHours();
  const m = d.getMinutes().toString().padStart(2, '0');
  if (h === 0) h = 12;
  else if (h > 12) h -= 12;
  el.textContent = `${h}:${m}`;
}

// ── iOS chrome theme follows screen ─────────────────────────────────
function setChromeTheme(dark) {
  document.getElementById('ios-chrome')?.classList.toggle('dark', dark);
}

// ── Fetch question ─────────────────────────────────────────────────
async function fetchQuestion(history) {
  const res = await fetch('/api/question', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ history, version: getPromptVersion('question') }),
  });
  if (!res.ok) throw new Error(await res.text());
  return res.json();
}

// ── Pre-generate next question for each possible answer ────────────
function pregenerateNext(currentQuestion, currentHistory) {
  if (currentHistory.length + 1 >= MAX_Q) return; // don't bother on last Q
  currentQuestion.options.forEach(option => {
    const hypo = [...currentHistory, { q: currentQuestion.question, a: option }];
    const key = historyKey(hypo);
    if (!state.cache.has(key)) {
      state.cache.set(key, fetchQuestion(hypo));
    }
  });
}

// ── Render a question ──────────────────────────────────────────────
function renderQuestion(q) {
  state.current = q;
  document.getElementById('q-text').textContent = q.question;

  const grid = document.getElementById('options-grid');
  grid.innerHTML = '';

  q.options.forEach((opt, i) => {
    const tile = document.createElement('button');
    tile.className = 'option-tile enter';
    tile.innerHTML = `
      <img class="tile-icon" src="/icons/${q.icons[i]}" alt="" loading="lazy" onerror="this.src='/icons/star.png'">
      <span class="tile-label">${opt}</span>`;
    tile.addEventListener('click', () => onOptionTap(i));
    grid.appendChild(tile);
  });

  // Trigger enter animation in next frame
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      grid.querySelectorAll('.option-tile').forEach((t, i) => {
        setTimeout(() => t.classList.add('enter-active'), i * 60);
        setTimeout(() => { t.classList.remove('enter'); t.classList.remove('enter-active'); }, i * 60 + 450);
      });
    });
  });
}

// ── Handle option tap ──────────────────────────────────────────────
async function onOptionTap(idx) {
  if (state.isTransitioning) return;
  state.isTransitioning = true;

  const tiles = document.querySelectorAll('.option-tile');
  const chosen = state.current.options[idx];

  // Highlight selection
  tiles[idx].classList.add('selected');
  tiles.forEach((t, i) => { if (i !== idx) t.classList.add('fading'); });

  await sleep(320);

  // Save to history
  state.history.push({ q: state.current.question, a: chosen });

  const qNum = state.history.length;
  updateProgress(qNum, MAX_Q);

  // Show "See results" after MIN_Q
  if (qNum >= MIN_Q) {
    document.getElementById('btn-results').classList.add('visible');
  }

  // Exit all tiles
  tiles.forEach(t => t.classList.add('exit'));
  await sleep(300);

  // If we've hit max, kick off the completion ritual
  if (qNum >= MAX_Q) {
    state.isTransitioning = false;
    startCompletion();
    return;
  }

  // Get next question (from cache or fresh fetch)
  showLoading(true);
  const key = historyKey(state.history);
  let nextQ;
  try {
    nextQ = state.cache.has(key)
      ? await state.cache.get(key)
      : await fetchQuestion(state.history);
  } catch (e) {
    console.error(e);
    showLoading(false);
    state.isTransitioning = false;
    return;
  }

  showLoading(false);
  renderQuestion(nextQ);
  pregenerateNext(nextQ, state.history);
  state.isTransitioning = false;
}

function showLoading(show) {
  document.getElementById('loading-dots').style.display = show ? 'flex' : 'none';
  document.getElementById('screen-question').classList.toggle('loading', show);
}

// ── Quiz start / back ──────────────────────────────────────────────
async function startQuiz() {
  showScreen('screen-question');
  updateProgress(0, MAX_Q);
  showLoading(true);

  try {
    const q = await fetchQuestion([]);
    showLoading(false);
    renderQuestion(q);
    pregenerateNext(q, []);
  } catch (e) {
    console.error(e);
    showLoading(false);
    document.getElementById('q-text').textContent = 'Something went wrong. Is the server running?';
  }
}

function goBack() {
  if (state.isTransitioning) return;
  if (state.history.length === 0) {
    showScreen('screen-intro');
    return;
  }
  // Simple back: pop last history entry and re-render — we don't cache backwards
  state.history.pop();
  updateProgress(state.history.length, MAX_Q);
  if (state.history.length < MIN_Q) {
    document.getElementById('btn-results').classList.remove('visible');
  }
  // Would need to re-generate current question; for prototype just go to intro
  showScreen('screen-intro');
}

// ── Mirror reveal ──────────────────────────────────────────────────
function fetchMirror() {
  return fetch('/api/mirror', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ history: state.history, version: getPromptVersion('mirror') }),
  }).then(r => r.ok ? r.json() : Promise.reject(new Error('mirror fetch failed')));
}

// ── Completion ritual ──────────────────────────────────────────────
// 1. Slide ring to centre, kick off mirror request in background.
// 2. User taps the orb → video plays inside it.
// 3. Once both the video has played a beat AND the mirror data is ready,
//    we transition to the mirror screen.
function startCompletion() {
  if (state.mirrorPromise) return; // already running
  state.mirrorPromise = fetchMirror().catch(err => {
    console.error(err);
    return null;
  });
  // Centre orb starts at the same fill % as the topbar ring (handles early
  // skips after Q5 — tap then completes the ring before the video reveals).
  setOrbProgress(state.history.length / MAX_Q);
  document.getElementById('screen-question').classList.add('completing');
  // Hint: warm up the video so the tap feels instant
  try { document.getElementById('orb-video')?.load(); } catch {}
}

async function onOrbTap() {
  const orb = document.getElementById('completion-orb');
  if (!orb || orb.classList.contains('filled') || orb.dataset.filling === '1') return;
  orb.dataset.filling = '1';

  // Beat 1 — finish the metal ring (animate from current % to 100). Even if
  // already at 100, run a tiny pulse so the tap registers visually.
  await animateOrbProgressTo(1, _orbProgress < 1 ? 700 : 220);

  // Beat 2 — fade ring out, fade 3D liquid-glass video in.
  orb.classList.add('filled');
  const video = document.getElementById('orb-video');
  if (video) {
    try { video.currentTime = 0; await video.play(); } catch {}
  }

  // Preview mode: stay on this screen so the orb visuals can be iterated on.
  if (state.previewOrbMode) {
    await sleep(3500);
    orb.classList.remove('filled');
    setOrbProgress(0.5); // back to a partial state for next preview tap
    delete orb.dataset.filling;
    return;
  }

  // Hold the orb on screen for a beat AND wait for mirror data.
  const data = await Promise.race([
    state.mirrorPromise || Promise.resolve(null),
    new Promise((_, rej) => setTimeout(() => rej('timeout'), 20000)),
  ]).catch(() => null);

  await sleep(1500); // give the orb fill animation time to feel intentional
  delete orb.dataset.filling;

  showMirrorWithData(data);
}

function showMirrorWithData(data) {
  showScreen('screen-mirror');
  const dims = { energy: 0.5, identity: 0.5, rituals: 0.5, bonds: 0.5, aspirations: 0.5 };

  if (data) {
    state.mirrorData = data;
    document.getElementById('mirror-text').textContent = data.mirror || '…';
    document.getElementById('mirror-num').textContent = '#' + randomUserNum();
    drawWabiMark(data.dimensions || dims);
    buildAppsScreen(data.apps || []);
  } else {
    document.getElementById('mirror-text').textContent = "Couldn't load your mirror. Try again.";
    document.getElementById('mirror-num').textContent = '';
    drawWabiMark(dims);
  }

  // Reset completion state for the next run
  document.getElementById('screen-question').classList.remove('completing');
  document.getElementById('completion-orb').classList.remove('filled');
  state.mirrorPromise = null;
}

function randomUserNum() {
  return (Math.floor(Math.random() * 8000) + 1200).toLocaleString();
}

// ── Apps screen ────────────────────────────────────────────────────
function buildAppsScreen(apps) {
  const list = document.getElementById('apps-list');
  list.innerHTML = '';
  apps.forEach((app, i) => {
    const card = document.createElement('div');
    card.className = 'app-card';
    card.innerHTML = `
      <div class="app-card-num">${i + 1}</div>
      <div class="app-card-content">
        <div class="app-card-name">${app.name}</div>
        <div class="app-card-reason">${app.reason}</div>
      </div>`;
    list.appendChild(card);
    setTimeout(() => card.classList.add('visible'), i * 120 + 100);
  });
  setTimeout(() => {
    document.getElementById('apps-done-btn').classList.add('visible');
  }, apps.length * 120 + 400);
}

function restartQuiz() {
  state.history = [];
  state.cache.clear();
  state.current = null;
  state.mirrorData = null;
  state.mirrorPromise = null;
  state.previewOrbMode = false;
  document.getElementById('btn-results').classList.remove('visible');
  document.getElementById('screen-question').classList.remove('completing');
  document.getElementById('completion-orb').classList.remove('filled');
  updateProgress(0, MAX_Q);
  showScreen('screen-intro');
}

// ── Share ──────────────────────────────────────────────────────────
async function shareMirror() {
  const text = state.mirrorData?.mirror || 'Wabi Mirror';
  if (navigator.share) {
    try {
      await navigator.share({ text: text + '\n\nDiscover yours at wabi.app' });
    } catch (_) {}
  } else {
    await navigator.clipboard.writeText(text);
    alert('Copied to clipboard!');
  }
}

// ── Wabi Mark generative art ───────────────────────────────────────
const PALETTES = {
  energy:      { bg1: '#FF6B35', bg2: '#C1390F', acc: '#FFD166', specular: 'rgba(255,255,200,0.4)' },
  identity:    { bg1: '#7B4FD9', bg2: '#3D1A8A', acc: '#C084FC', specular: 'rgba(220,200,255,0.4)' },
  rituals:     { bg1: '#2EC4B6', bg2: '#0D7A72', acc: '#A3F4EF', specular: 'rgba(200,255,250,0.4)' },
  bonds:       { bg1: '#F72585', bg2: '#8A0047', acc: '#FFAAD4', specular: 'rgba(255,200,230,0.4)' },
  aspirations: { bg1: '#F9C74F', bg2: '#B07C00', acc: '#FFEFB0', specular: 'rgba(255,255,200,0.5)' },
};

function seededRng(seed) {
  let s = Math.abs(Math.round(seed * 1e6)) || 12345;
  return () => {
    s = (s * 16807 + 0) % 2147483647;
    return (s - 1) / 2147483646;
  };
}

function drawCircle(canvas, score, palette, seedVal) {
  const ctx = canvas.getContext('2d');
  const size = canvas.width;
  const c = size / 2;
  const rng = seededRng(seedVal);

  ctx.clearRect(0, 0, size, size);
  ctx.save();
  ctx.beginPath();
  ctx.arc(c, c, c - 1, 0, Math.PI * 2);
  ctx.clip();

  // Background gradient
  const bg = ctx.createRadialGradient(c * 0.7, c * 0.6, 0, c, c, c * 1.3);
  bg.addColorStop(0, palette.bg1);
  bg.addColorStop(1, palette.bg2);
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, size, size);

  // Organic blobs based on score
  const blobCount = 2 + Math.round(score * 3);
  for (let i = 0; i < blobCount; i++) {
    const bx = size * (0.15 + rng() * 0.7);
    const by = size * (0.15 + rng() * 0.7);
    const br = size * (0.12 + rng() * 0.22 * score + 0.08);
    const grad = ctx.createRadialGradient(bx, by, 0, bx, by, br);
    const alpha = Math.round((0.4 + rng() * 0.4) * 255).toString(16).padStart(2, '0');
    grad.addColorStop(0, palette.acc + alpha);
    grad.addColorStop(1, palette.acc + '00');
    ctx.beginPath();
    ctx.arc(bx, by, br, 0, Math.PI * 2);
    ctx.fillStyle = grad;
    ctx.fill();
  }

  // Specular highlight
  const spec = ctx.createRadialGradient(c * 0.55, c * 0.4, 0, c * 0.55, c * 0.4, c * 0.85);
  spec.addColorStop(0, palette.specular);
  spec.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = spec;
  ctx.fillRect(0, 0, size, size);

  // Vignette
  const vig = ctx.createRadialGradient(c, c, c * 0.4, c, c, c);
  vig.addColorStop(0, 'rgba(0,0,0,0)');
  vig.addColorStop(1, 'rgba(0,0,0,0.35)');
  ctx.fillStyle = vig;
  ctx.fillRect(0, 0, size, size);

  ctx.restore();
}

function drawWabiMark(dimensions) {
  const dims = ['energy', 'identity', 'rituals', 'bonds', 'aspirations'];
  dims.forEach((dim, i) => {
    const canvas = document.getElementById('c-' + dim);
    if (!canvas) return;
    drawCircle(canvas, dimensions[dim] ?? 0.5, PALETTES[dim], (dimensions[dim] ?? 0.5) + i);
  });
}

// ── Boot ───────────────────────────────────────────────────────────
initSidebar();
updateClock();
setInterval(updateClock, 30 * 1000);
</script>
